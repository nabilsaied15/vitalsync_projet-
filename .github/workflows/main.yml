name: VitalSync CI/CD Pipeline
on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: cd backend && npm install
      - name: Run test
        run: cd backend && npm test
  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend
        run: docker build -t vitalsync-backend:${{ github.sha }} -f backend/Dockerfile .
      - name: Build frontend
        run: docker build -t vitalsync-frontend:${{ github.sha }} -f frontend/Dockerfile ./frontend
