apiVersion: apps/v1
kind: Deployment
metadata:
  name: vitalsync-backend
spec:
  replicas: 2 # Justification: 2 replicas ensure high availability (if one pod fails, the other continues).
  selector:
    matchLabels:
      app: vitalsync-backend
  template:
    metadata:
      labels:
        app: vitalsync-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/<USERNAME>/vitalsync-backend:latest # Replace <USERNAME>
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: vitalsync-db
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vitalsync-db-secret
              key: POSTGRES_PASSWORD
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        # Readiness probes could also be added here for production.
---
apiVersion: v1
kind: Service
metadata:
  name: vitalsync-backend
spec:
  selector:
    app: vitalsync-backend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP # Internal exposure only.
