apiVersion: apps/v1
kind: Deployment
metadata:
  name: vitalsync-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vitalsync-frontend
  template:
    metadata:
      labels:
        app: vitalsync-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/<USERNAME>/vitalsync-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: vitalsync-frontend
spec:
  selector:
    app: vitalsync-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: NodePort
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vitalsync-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: vitalsync-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vitalsync-frontend
            port:
              number: 80
